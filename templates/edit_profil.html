{% extends 'base.html' %}

{% block content %}

<section class="profil-section">

<div class="container">

    <div class="profil-title">

        <h1>Edit Profil</h1>

        <p>
            Perbarui informasi akunmu
        </p>

    </div>

    <form action="/update_profil" method="POST">

        <div class="edit-card">

            <div class="profile-avatar">

                <i class="bi bi-person-fill"></i>

            </div>

            <div class="form-group">

                <label>Nama Lengkap</label>

                <input
                type="text"
                name="nama"
                value="{{ user.nama }}"
                required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                type="email"
                name="email"
                value="{{ user.email }}"
                required>

            </div>

            <div class="form-group">

                <label>Usia</label>

                <input
                type="number"
                name="usia"
                value="{{ user.usia }}"
                required>

            </div>

            <div class="form-group">

                <label>Jenis Kelamin</label>

                <select name="gender">

                    <option value="Laki-laki"
                    {% if user.gender == 'Laki-laki' %}
                    selected
                    {% endif %}>
                        Laki-laki
                    </option>

                    <option value="Perempuan"
                    {% if user.gender == 'Perempuan' %}
                    selected
                    {% endif %}>
                        Perempuan
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Program Studi</label>

                <input
                type="text"
                name="prodi"
                value="{{ user.prodi }}">

            </div>

            <div class="form-group">

                <label>Semester</label>

                <input
                type="number"
                name="semester"
                value="{{ user.semester }}">

            </div>

            <div class="btn-group">

                <button type="submit"
                        class="save-btn">

                    Simpan Perubahan

                </button>

                <a href="/profil"
                   class="cancel-btn">

                    Batal

                </a>

            </div>

        </div>

    </form>

</div>

</section>

{% endblock %}
